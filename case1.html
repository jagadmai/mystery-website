<section class="case">

<h2>The Missing Necklace</h2>

<p class="instructions">Click objects in the scene to investigate.</p>

<div class="crime-scene">

<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1400" class="scene">

<div class="clue clue1" onclick="revealClue(1)"></div>
<div class="clue clue2" onclick="revealClue(2)"></div>
<div class="clue clue3" onclick="revealClue(3)"></div>

</div>

<div class="clue-display">

<h3>Clue Found</h3>

<p id="clueText">Investigate the room...</p>

</div>

<div class="solve-box">

<input id="answer" placeholder="Who stole the necklace?">

<button onclick="checkAnswer()">Solve Case</button>

</div>

<div class="score">

Detective Score: <span id="score">0</span>

</div>

</section>

<script src="script.js"></script>
