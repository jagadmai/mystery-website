<section class="case-container">

<h2>The Missing Necklace</h2>

<p class="instructions">
Click objects in the house to search for clues.
</p>

<div class="crime-scene">

<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200" class="scene-image">

<div class="clue clue1" onclick="showClue('footprint')"></div>
<div class="clue clue2" onclick="showClue('letter')"></div>
<div class="clue clue3" onclick="showClue('window')"></div>

</div>

<div class="clue-box" id="clueBox">

<h3>Clue</h3>

<p id="clueText"></p>

</div>

<div class="solution">

<input id="answer" placeholder="Who stole the necklace?">

<button onclick="checkAnswer()">Submit</button>

</div>

</section>
