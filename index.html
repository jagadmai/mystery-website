<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Case Files</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

canvas{
display:block;
}

/* MENU */

#menu{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#menu h1{
font-size:60px;
margin-bottom:40px;
letter-spacing:3px;
}

#menu button{
padding:20px 40px;
font-size:20px;
border:none;
background:white;
cursor:pointer;
border-radius:8px;
}

/* HUD */

#hud{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
z-index:5;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:8px;
height:8px;
background:white;
border-radius:50%;
transform:translate(-50%,-50%);
}

/* Evidence */

#evidence{
position:absolute;
right:20px;
top:20px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
width:200px;
}

</style>
</head>

<body>

<div id="menu">
<h1>DETECTIVE FILES</h1>
<button onclick="startGame()">START INVESTIGATION</button>
</div>

<div id="hud">
Move: Arrow Keys<br>
Look: Mouse<br>
Find Evidence
</div>

<div id="evidence">
<b>Evidence</b>
<ul id="evidenceList"></ul>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene,camera,renderer
let keys={}
let objects=[]
let evidenceFound=[]

let yaw=0
let pitch=0

function startGame(){

document.getElementById("menu").style.display="none"

init()
animate()

}

/* SCENE */

function init(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.set(0,1.7,6)

/* LIGHT */

const light=new THREE.PointLight(0xffffff,2)
light.position.set(0,5,5)
scene.add(light)

const ambient=new THREE.AmbientLight(0x404040)
scene.add(ambient)

/* FLOOR */

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(40,40),
new THREE.MeshStandardMaterial({color:0x222222})
)

floor.rotation.x=-Math.PI/2
scene.add(floor)

/* WALLS */

const wallMat=new THREE.MeshStandardMaterial({color:0x444444})

function wall(x,z,r){

let w=new THREE.Mesh(
new THREE.BoxGeometry(40,8,1),
wallMat
)

w.position.set(x,4,z)
w.rotation.y=r
scene.add(w)

}

wall(0,-20,0)
wall(0,20,0)
wall(-20,0,Math.PI/2)
wall(20,0,Math.PI/2)

/* DESK */

let desk=new THREE.Mesh(
new THREE.BoxGeometry(3,1,2),
new THREE.MeshStandardMaterial({color:0x6b4a2f})
)

desk.position.set(0,0.5,0)
scene.add(desk)

/* CLUE 1 */

let note=new THREE.Mesh(
new THREE.BoxGeometry(0.5,0.05,0.5),
new THREE.MeshStandardMaterial({color:0xffffaa})
)

note.position.set(0,1.05,0)
note.userData.clue="Strange Note"
scene.add(note)
objects.push(note)

/* CLUE 2 */

let knife=new THREE.Mesh(
new THREE.BoxGeometry(0.1,0.1,1),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

knife.position.set(-3,0.5,-2)
knife.userData.clue="Bloody Knife"
scene.add(knife)
objects.push(knife)

/* CLUE 3 */

let phone=new THREE.Mesh(
new THREE.BoxGeometry(0.4,0.1,0.7),
new THREE.MeshStandardMaterial({color:0x111111})
)

phone.position.set(2,0.5,3)
phone.userData.clue="Victim's Phone"
scene.add(phone)
objects.push(phone)

/* INPUT */

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

/* MOUSE LOOK */

document.addEventListener("mousemove",e=>{

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-1.5,Math.min(1.5,pitch))

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

})

document.addEventListener("click",interact)

}

/* MOVEMENT */

function move(){

let speed=0.12

let forward=new THREE.Vector3()
camera.getWorldDirection(forward)

let right=new THREE.Vector3()
right.crossVectors(camera.up,forward).normalize()

if(keys["ArrowUp"]) camera.position.add(forward.multiplyScalar(speed))
if(keys["ArrowDown"]) camera.position.add(forward.multiplyScalar(-speed))
if(keys["ArrowLeft"]) camera.position.add(right.multiplyScalar(speed))
if(keys["ArrowRight"]) camera.position.add(right.multiplyScalar(-speed))

}

/* INTERACTION */

function interact(){

let ray=new THREE.Raycaster()

ray.setFromCamera(
new THREE.Vector2(0,0),
camera
)

let hit=ray.intersectObjects(objects)

if(hit.length>0){

let obj=hit[0].object
let clue=obj.userData.clue

if(!evidenceFound.includes(clue)){

evidenceFound.push(clue)

let li=document.createElement("li")
li.textContent=clue
document.getElementById("evidenceList").appendChild(li)

}

}

}

/* LOOP */

function animate(){

requestAnimationFrame(animate)

move()

renderer.render(scene,camera)

}

</script>

</body>
</html>
